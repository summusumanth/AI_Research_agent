<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>arXiv Curator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<!-- Mobile overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ── Sidebar ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="logo-text">
      <span class="logo-title">arXiv Curator</span>
      <span class="logo-sub">Agentic RAG</span>
    </div>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    New conversation
  </button>

  <div class="sidebar-section-label">Recent</div>
  <div class="chat-list" id="chatList"></div>

  <div class="sidebar-footer">
    <div class="sidebar-section-label" style="padding: 0 0 6px;">Search Mode</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeRag"    onclick="setMode('rag')">RAG Ask</button>
      <button class="mode-btn"        id="modeHybrid" onclick="setMode('hybrid')">Hybrid</button>
      <button class="mode-btn"        id="modeAgent"  onclick="setMode('agent')">Agentic</button>
    </div>
    <div class="status-row">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Checking API…</span>
    </div>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">

  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="openSidebar()" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbarTitle">New conversation</span>
    </div>
    <div class="topbar-right">
      <span class="badge" id="modeBadge">RAG Ask</span>
      <button class="icon-btn" title="API Docs" onclick="window.open('/docs','_blank')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/>
        </svg>
      </button>
      <button class="icon-btn" title="Clear chat" onclick="clearChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="messages-wrap" id="messagesWrap">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <div class="empty-title">Ask about any AI paper</div>
      <div class="empty-sub">Search ingested arXiv papers with hybrid retrieval. The agent validates, retrieves, grades, and rewrites queries when needed.</div>
      <div class="suggestion-grid">
        <button class="suggestion-card" onclick="useSuggestion(this)"><div class="s-label">Trending topic</div><div class="s-text">What are the latest advances in reasoning with LLMs?</div></button>
        <button class="suggestion-card" onclick="useSuggestion(this)"><div class="s-label">Architecture</div><div class="s-text">Explain the Transformer attention mechanism from recent papers</div></button>
        <button class="suggestion-card" onclick="useSuggestion(this)"><div class="s-label">Comparison</div><div class="s-text">How do RLHF and DPO compare for aligning language models?</div></button>
        <button class="suggestion-card" onclick="useSuggestion(this)"><div class="s-label">Deep dive</div><div class="s-text">Summarise recent work on mixture-of-experts scaling</div></button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <div class="input-row">
        <textarea id="chatInput" placeholder="Ask a question about AI/CS research papers…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="input-mode-badge" id="inputModeBadge">RAG Ask · Streaming</span>
        <span>Enter to send · Shift+Enter for new line</span>
      </div>
    </div>
  </div>

</main>

<script src="/static/app.js"></script>
</body>
</html>
